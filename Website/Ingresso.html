<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingressos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

    <div class="container mt-5 text-center">
        <h1>Ingressos Festival SENAI 2026</h1>
        <p class="mt-4">
            Escolha seu ingresso abaixo.
        </p>
        <br><br>
        <div class="alert alert-warning text-center mt-4" role="alert">
             Ingressos promocionais disponíveis por tempo limitado!
        </div>
        <h5 class="mt-4">
            <span class="badge bg-success"> Ingressos Novos</span>
        </h5>
        <section id="contato" class="py-5 text-start">
            <h2 class="text-center fw-bold mb-4">Contato</h2>
            <form>
                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text" class="form-control" placeholder="Seu nome">
                </div>
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" class="form-control" placeholder="Seu e-mail">
                </div>
                <div class="mb-3">
                    <label class="form-label">Quantos Ingressos</label>
                    <input type="email" class="form-control" placeholder="Seu e-mail">
                </div>
                <button type="submit" class="btn btn-danger">
                    Enviar
                </button>
            </form>
        </section>
        <a href="./index.html" class="btn btn-light mt-3">
            Voltar
        </a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <a href="./Indexar.html"> <button> VOLTAR </button> </a>
</body>
</html>
